<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="main-container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="dashboard-title">
NBBS Social Media Dashboard
</h2>

<ul>

<li><a href="index.html"><i class="fa fa-home"></i>Dashboard</a></li>

<li><a href="calendar.html"><i class="fa fa-calendar"></i>Calendar</a></li>

<li><a href="analytics.html"><i class="fa fa-chart-line"></i>Analytics</a></li>

<li><a href="team.html"><i class="fa fa-users"></i>Team</a></li>

<li><a href="reminders.html"><i class="fa fa-bell"></i>Reminders</a></li>

</ul>

</div>

<!-- CONTENT -->

<div class="content-area">

<h1 class="mb-4">Analytics Dashboard</h1>

<div class="row mb-4">

<div class="col-md-4">

<div class="card-box">

<h5>Total Posts</h5>

<h1 id="totalPosts">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h5>Posted</h5>

<h1 id="postedPosts">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h5>Pending</h5>

<h1 id="pendingPosts">0</h1>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6">

<div class="card-box">

<h3 class="mb-4">
Platform Distribution
</h3>

<canvas id="platformChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card-box">

<h3 class="mb-4">
Status Distribution
</h3>

<canvas id="statusChart"></canvas>

</div>

</div>

</div>

</div>

</div>

<script>

fetch("https://script.google.com/macros/s/AKfycbwuhRCZOhSpG4w_xgSbTKHX-CK7fl0ZJsraB2DukoOcfTx7AO66-Dwi6tthlz9NXq6xyw/exec")

.then(res => res.json())

.then(data => {

document.getElementById("totalPosts").innerText =
data.length;

document.getElementById("postedPosts").innerText =
data.filter(p => p.Status == "Posted").length;

document.getElementById("pendingPosts").innerText =
data.filter(p => p.Status == "Pending").length;

const platforms = {};

data.forEach(post => {

platforms[post.Platform] =
(platforms[post.Platform] || 0) + 1;

});

new Chart(document.getElementById('platformChart'), {

type:'pie',

data:{

labels:Object.keys(platforms),

datasets:[{

data:Object.values(platforms),

backgroundColor:[
'#f472b6',
'#22c55e',
'#7f1d1d',
'#1e3a8a',
'#60a5fa'
]

}]

}

});

const status = {};

data.forEach(post => {

status[post.Status] =
(status[post.Status] || 0) + 1;

});

new Chart(document.getElementById('statusChart'), {

type:'pie',

data:{

labels:Object.keys(status),

datasets:[{

data:Object.values(status),

backgroundColor:[
'#22c55e',
'#ef4444',
'#eab308'
]

}]

}

});

});

</script>

</body>

</html>
