<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reminders</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="dashboard-title">
NBBS Social Media Dashboard
</h2>

<ul>

<li><a href="index.html"><i class="fa fa-home"></i>Dashboard</a></li>

<li><a href="calendar.html"><i class="fa fa-calendar"></i>Calendar</a></li>

<li><a href="analytics.html"><i class="fa fa-chart-line"></i>Analytics</a></li>

<li><a href="team.html"><i class="fa fa-users"></i>Team</a></li>

<li><a href="reminders.html"><i class="fa fa-bell"></i>Reminders</a></li>

</ul>

</div>

<!-- CONTENT -->

<div class="content-area">

<h1 class="mb-4">Reminder Center</h1>

<div id="reminderContainer"></div>

</div>

</div>

<script>

fetch("https://script.google.com/macros/s/AKfycbwuhRCZOhSpG4w_xgSbTKHX-CK7fl0ZJsraB2DukoOcfTx7AO66-Dwi6tthlz9NXq6xyw/exec")

.then(res => res.json())

.then(data => {

const container =
document.getElementById("reminderContainer");

const today = new Date();

today.setHours(0,0,0,0);

data.forEach(post => {

const postDate = new Date(post.Date);

postDate.setHours(0,0,0,0);

const diffTime =
postDate - today;

const diffDays =
diffTime / (1000 * 60 * 60 * 24);

if(diffDays <= 1 && post.Status != 'Posted'){

container.innerHTML += `

<div class="card-box">

<h4 class="mb-3">
${post.Platform} - ${post.Reel}
</h4>

<p><strong>Topic:</strong> ${post.Topic}</p>

<p><strong>Date:</strong> ${formatDate(post.Date)}</p>

<p><strong>Time:</strong> ${formatTime(post.Time)}</p>

<p>

<span class="
${post.Status == 'Pending' ? 'red' : 'yellow'}
">

${post.Status}

</span>

</p>

</div>

`;

}

});

});

function formatDate(date){

if(!date) return "";

return new Date(date).toLocaleDateString("en-IN", {

day:"2-digit",
month:"short",
year:"numeric"

});

}

function formatTime(time){

if(!time) return "";

return new Date(time).toLocaleTimeString("en-IN", {

hour:"2-digit",
minute:"2-digit",
hour12:true

});

}

</script>

</body>

</html>
